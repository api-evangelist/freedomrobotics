aid: freedomrobotics
name: Freedom Robotics
description: >-
  Freedom Robotics is a San Francisco-based robotics infrastructure company
  founded in 2017 that builds mission-critical software to help robotics
  companies build, operate, support, and scale heterogeneous robot fleets. Its
  cloud platform — sometimes referred to as Mission Control — provides device
  and fleet management, remote teleoperation (Pilot), live data streaming,
  smart alerts and notifications, fleet maps and heatmaps, deployment and
  service management, remote development, and analytics across cobots,
  industrial robots, AMRs, drones, and custom hardware. The platform is robot-
  and OS-agnostic, installs on a device in seconds via a single-line Freedom
  Agent installer, and integrates with ROS, ROS 2, Python, microcontrollers,
  Protobuf, Docker, and the cloud offerings of AWS, Google Cloud, and Azure.
  Freedom exposes a public REST API at api.freedomrobotics.ai covering
  accounts, devices, alerts, statistics, uploads, tokens, users, user groups,
  and zones, plus a Python SDK (freedomrobotics.link) with Link, MicroLink,
  message, log, image, and command-callback primitives for programmatic
  control and telemetry of large numbers of robots. The company has raised
  approximately $17M in venture funding and operates on a per-robot
  subscription model (publicly cited at roughly $300 per robot per month) with
  custom enterprise plans negotiated through sales.
